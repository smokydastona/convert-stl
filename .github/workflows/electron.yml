name: Build Electron Distributions

on:
  push:
    branches: ["master"]
    tags: ["*"]
  pull_request:

jobs:
  build-electron:
    runs-on: ${{ matrix.os }}

    env:
      VITE_COMMIT_SHA: ${{ github.sha }}
      # Pin Bun to avoid CI breakages when "latest" is temporarily unavailable.
      BUN_VERSION: 1.3.9
      # Cache location for Puppeteer's downloaded browsers
      PUPPETEER_CACHE_DIR: ~/.cache/puppeteer

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: windows-2025
            platform: win
          - os: macos-15
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        continue-on-error: true
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # Fallback for intermittent GitHub release asset 5xx from setup-bun.
      # Only needed on Windows where other installation paths are less consistent.
      - name: Ensure Bun (fallback, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Get-Command bun -ErrorAction SilentlyContinue) {
            bun --version
            exit 0
          }

          $version = "$env:BUN_VERSION"
          if (-not $version) { $version = "1.3.9" }

          $url = "https://github.com/oven-sh/bun/releases/download/bun-v$version/bun-windows-x64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "bun-windows-x64.zip"
          $dest = Join-Path $env:RUNNER_TEMP "bun"

          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          for ($i = 1; $i -le 6; $i++) {
            try {
              Write-Host "Downloading Bun $version (attempt $i): $url"
              Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
              break
            } catch {
              if ($i -eq 6) { throw }
              $delay = 5 * $i
              Write-Host "Download failed. Waiting $delay seconds before retry..."
              Start-Sleep -Seconds $delay
            }
          }

          Expand-Archive -Path $zip -DestinationPath $dest -Force

          $bunExe = Get-ChildItem $dest -Recurse -Filter bun.exe | Select-Object -First 1
          if (-not $bunExe) {
            throw "bun.exe not found after extracting $zip to $dest"
          }

          $binDir = $bunExe.Directory.FullName
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          bun --version

      - name: Cache Bun and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/puppeteer
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('package.json', 'bun.lockb', 'bun.lock', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install Puppeteer Chrome (cached)
        run: bunx puppeteer browsers install chrome

      # Test (Linux only)
      - name: Build (for testing)
        if: matrix.platform == 'linux'
        run:  bun run build
      - name: Generate cache (for testing)
        if: matrix.platform == 'linux'
        run: bun run cache:build
      - name: Test traversion graph
        if: matrix.platform == 'linux'
        run: bun test test/TraversionGraph.test.ts
      - name: Test common conversion routes
        if: matrix.platform == 'linux'
        run: bun test test/commonFormats.test.ts

      - name: Build Distribution for ${{ matrix.platform }}
        run: bun run desktop:dist:${{ matrix.platform }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: convert-desktop-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
            release/*.snap
            release/*.deb
          retention-days: 7
      
      - name: Publish GitHub Release (if new tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
            release/*.snap
            release/*.deb
          generate_release_notes: true
          draft: true
